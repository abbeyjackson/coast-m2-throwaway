# Coast deterministic gates (D23, D30 net 1; D47).
# The proof verifier is a pure function of the PR trees + commit graph.
# The review agent job (S14) is added by Coast when the pipeline reaches it.
name: coast-gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  proof-verifier:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify proof deterministically
        run: |
          python3 Scripts/checks/verify_proof.py \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ github.head_ref }}"

  swift-tests:
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # the plans-only detector diffs against the base
      # Cost seam (benchmark follow-up, 2026-07-17): a diff touching only
      # Coast's bookkeeping (plans/**) cannot change the suite's result — the
      # source tree is byte-identical to one already verified green (the plan
      # PR, and the push to main when it merges). Guarded and fail-open: any
      # diff-computation trouble falls through to running the suite.
      - name: Detect a plans-only diff
        id: plansonly
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          else
            RANGE="${{ github.event.before }}..${{ github.event.after }}"
          fi
          SKIP=false
          if CHANGED=$(git diff --name-only "$RANGE" 2>/dev/null) && [ -n "$CHANGED" ] \
             && ! echo "$CHANGED" | grep -qv '^plans/'; then
            SKIP=true
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
      - name: Cache SPM build
        if: steps.plansonly.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Build and test
        if: steps.plansonly.outputs.skip != 'true'
        run: swift test
      - name: Plans-only diff — suite verdict carried from the verified base
        if: steps.plansonly.outputs.skip == 'true'
        run: echo "Only plans/** changed; the source tree matches one already verified green. Success without re-running the suite."

  # The reviewer identity (github-actions[bot], config A1 from the F5
  # research). Plan PRs (S6): the deterministic gates ARE the plan's checks —
  # once they pass, this job records the approving review the ruleset
  # requires. Implementation PRs (S14): the review agent runs here and
  # decides approve vs request-changes like a human reviewer (D26).
  gate-review:
    if: github.event_name == 'pull_request'
    needs: [proof-verifier, swift-tests]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0  # the review agent diffs base..head — needs full history
      # The reviewer identity (D94): the customer-owned reviewer App. Its
      # short-lived token signs the reviews, so the audit trail reads
      # "<project>-reviewer approved" and the ruleset counts the vote.
      - name: Mint reviewer App token
        id: reviewer-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_KEY }}
      - name: Determine PR purpose from the proof file
        id: purpose
        run: |
          # Identity from the PR's content, never the branch name (the
          # branch format is a per-project setting — round 23).
          FEATURE_ID=$(git diff --name-only "${{ github.event.pull_request.base.sha }}".."${{ github.event.pull_request.head.sha }}" -- plans/ | awk -F/ 'NF>=3 {print $2}' | sort -u)
          test "$(echo "$FEATURE_ID" | wc -w)" -eq 1
          PURPOSE=$(python3 -c "import json; print(json.load(open('plans/$FEATURE_ID/proof.json'))['purpose'])")
          echo "purpose=$PURPOSE" >> "$GITHUB_OUTPUT"
      - name: Approve plan PR (deterministic gates green)
        if: steps.purpose.outputs.purpose == 'plan-pr'
        env:
          GH_TOKEN: ${{ steps.reviewer-token.outputs.token }}
        run: |
          gh api -X POST "/repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/reviews" \
            -f event=APPROVE \
            -f body="Plan gates green: proof verified deterministically (checks 1,2,3,4,8), schema valid, suite green. Approving the plan PR (S6)."
      - name: Review agent (implementation PR)
        if: steps.purpose.outputs.purpose == 'implementation-pr'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.reviewer-token.outputs.token }}
        run: |
          python3 Scripts/checks/review_agent.py "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"
